<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>普通話水平測試朗讀作品1號</title>
    <style>
        /* 字體棧設置：優先使用圓體 */
        body {
            font-family: "Yuanti SC", "YouYuan", "Microsoft YaHei", "Heiti SC", sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
            color: #333;
            padding-bottom: 100px; /* 為底部開發者按鈕留空間 */
        }

        /* 頂部固定標題 */
        .header-title {
            position: fixed;
            top: 10px;
            right: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #333;
            z-index: 500;
            background: rgba(255, 255, 255, 0.8);
            padding: 5px 10px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* 登錄遮罩層 */
        #login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.98);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 80%;
            max-width: 400px;
        }

        .login-input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            font-family: inherit;
        }

        .login-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            font-family: inherit;
        }

        /* 主內容區域 */
        #main-content {
            display: none; /* 登錄後顯示 */
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            padding-top: 60px;
        }

        .header-info {
            font-size: 0.85rem;
            color: gray;
            margin-bottom: 30px;
            line-height: 1.6;
            text-align: justify;
        }

        /* 句子容器 */
        .sentence-container {
            background: white;
            margin-bottom: 25px;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }

        .sentence-container:hover {
            transform: translateY(-2px);
        }

        .pinyin-line {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 8px;
            line-height: 1.4;
            font-family: "Helvetica Neue", Arial, sans-serif; /* 拼音用無襯線體更清晰 */
        }

        .chinese-line {
            font-size: 1.5rem;
            color: #222;
            margin-bottom: 15px;
            line-height: 1.4;
            letter-spacing: 1px;
        }

        /* 播放控制按鈕 */
        .controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .play-btn {
            background: #f0f0f0;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .play-btn svg {
            width: 20px;
            height: 20px;
            fill: #555;
            margin-left: 2px; /* 視覺微調 */
        }

        .play-btn.playing {
            background: #e3f2fd;
        }

        .play-btn.playing svg {
            fill: #2196F3;
        }

        /* 完成按鈕區域 */
        .finish-section {
            text-align: center;
            margin: 50px 0;
        }

        .finish-btn {
            background: linear-gradient(135deg, #FF6B6B, #FF8E53);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
            font-family: inherit;
            font-weight: bold;
        }

        /* 彈窗 */
        #success-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            z-index: 3000;
            text-align: center;
            width: 80%;
            max-width: 300px;
            animation: popIn 0.3s ease-out;
        }

        @keyframes popIn {
            from { transform: translate(-50%, -60%); opacity: 0; }
            to { transform: translate(-50%, -50%); opacity: 1; }
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2999;
        }

        /* 開發者模式開關與面板 */
        #dev-toggle {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.1);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 9000;
        }

        #dev-panel {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #222;
            color: #0f0;
            padding: 20px;
            border-radius: 10px;
            z-index: 9001;
            font-family: monospace;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.3);
        }
        
        #dev-panel.active {
            display: block;
        }

        .dev-btn {
            background: #444;
            color: white;
            border: 1px solid #666;
            padding: 5px 10px;
            margin: 5px;
            cursor: pointer;
            font-family: monospace;
        }
        
        .active-sentence {
            border: 2px solid #2196F3;
        }

        /* 移動端優化 */
        @media (max-width: 600px) {
            .chinese-line { font-size: 1.3rem; }
            .pinyin-line { font-size: 0.95rem; }
            .header-title { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <div class="header-title">普通話水平測試朗讀作品1號</div>

    <!-- 登錄界面 -->
    <div id="login-overlay">
        <div class="login-box">

    <!-- 主內容 -->
    <div id="main-content">
        <div class="header-info">
            本網頁拼音均由AI生成，標準注音請參考《普通話水平測試實施綱要（2021年版）》。<br>

        <div id="sentences-list">

        <div class="finish-section">

    <!-- 音頻元素 -->
    <audio id="audio-player" preload="auto">
        <source src="pscleadreading01.mp4" type="audio/mp4">
        您的瀏覽器不支持音頻播放。
    </audio>

    <!-- 開發者模式觸發點 (左下角) -->
    <div id="dev-toggle" onclick="toggleDevPanel()" title="Developer Mode"></div>

    <!-- 開發者面板 -->
    <div id="dev-panel">
        <h3>開發者時間軸校準模式</h3>
        <p>狀態: <span id="dev-status">就緒</span> | 時間: <span id="dev-time">0.00</span>s</p>
        <p>操作指引：<br>1. 點擊「開始校準」，錄音將從頭播放。<br>2. 每當聽到一句結束/下一句開始時，立即點擊「標記下一句」。<br>3. 完成後點擊「生成代碼」。</p>
        <button class="dev-btn" onclick="startCalibration()">開始校準</button>
        <button class="dev-btn" onclick="markSplit()">標記下一句 (Space)</button>
        <button class="dev-btn" onclick="exportCode()">生成代碼</button>
        <textarea id="json-output" style="width:100%; height:100px; margin-top:10px; background:#333; color:#ccc; display:none;"></textarea>
    </div>

    <script>

    {

        "start": 85.93,

    },
    {
        "text": "孩子們歡喜，大人們也忙亂。",

        "pinyin": "Bìxū dàsǎochú yī cì, hái yào bǎ ròu, jī, yú, qīngcài, niángāo shénme de dōu yùbèi chōngzú——diànpù duōshù Zhēngyuè chūyī dào chūwǔ guānmén, dào Zhēngyuè chūliù cái kāizhāng.",

        let currentUser = "";
        let audio = document.getElementById("audio-player");
        let activeIndex = -1; // 當前播放的句子索引
        let isLooping = false; // 是否在單句播放模式

        // 初始化頁面
        function init() {
            const list = document.getElementById("sentences-list");
            contentData.forEach((item, index) => {
                const div = document.createElement("div");
                div.className = "sentence-container";
                div.id = `sentence-${index}`;
                div.innerHTML = `
                    <div class="pinyin-line">${item.pinyin}</div>
                    <div class="chinese-line">${item.text}</div>
                    <div class="controls">
                        <button class="play-btn" onclick="togglePlay(${index})">
                            <svg viewBox="0 0 24 24" id="icon-${index}">
                                <path d="M8 5v14l11-7z"/> <!-- Play Icon -->
                            </svg>
                        </button>
                    </div>
                `;
                list.appendChild(div);
            });

            // 監聽鍵盤 Enter
            document.addEventListener("keydown", (e) => {
                if(e.key === "Enter" && document.getElementById("login-overlay").style.display !== "none") {
                    checkLogin();
                }
                // 開發者模式快捷鍵
                if(devMode && e.code === "Space") {
                    e.preventDefault();
                    markSplit();
                }
            });

            // 監聽音頻更新，處理暫停邏輯
            audio.addEventListener("timeupdate", handleTimeUpdate);
            audio.addEventListener("ended", () => resetIcons());
            
            // Dev mode updates
            audio.addEventListener("timeupdate", () => {
                if(devMode) document.getElementById("dev-time").innerText = audio.currentTime.toFixed(2);
            });
        }

        // 登錄邏輯
        function checkLogin() {
            const name = document.getElementById("username").value.trim();
            const pass = document.getElementById("password").value.trim();
            
            if (!name) {
                document.getElementById("login-msg").innerText = "請輸入名字";
                return;
            }
            if (pass !== "vtcpsc") {
                document.getElementById("login-msg").innerText = "密碼錯誤";
                return;
            }

            currentUser = name;
            document.getElementById("login-overlay").style.display = "none";
            document.getElementById("main-content").style.display = "block";
            window.scrollTo(0, 0);
        }

        // 播放控制邏輯
        function togglePlay(index) {
            const icon = document.getElementById(`icon-${index}`);
            const btn = icon.parentElement;
            
            // 如果點擊的是當前正在播放/暫停的句子
            if (activeIndex === index) {
                if (audio.paused) {
                    audio.play();
                    updateIcon(index, "pause");
                } else {
                    audio.pause();
                    updateIcon(index, "play");
                }
            } else {
                // 切換到新句子
                resetIcons();
                activeIndex = index;
                // 從頭開始該句
                audio.currentTime = contentData[index].start;
                audio.play();
                updateIcon(index, "pause");
            }
        }

        function handleTimeUpdate() {
            if (activeIndex === -1) return;
            
            const endTime = contentData[activeIndex].end;
            
            // 如果超過了當前句子的結束時間，暫停並重置
            if (audio.currentTime >= endTime) {
                audio.pause();
                // 為了方便"反復使用"，暫停後進度條不回退，下次點擊Play會從暫停處繼續?
                // 用戶需求："再次按播放鍵便從能暫停的地方繼續播放" -> 這通常指暫停後繼續。
                // 但如果是"播放完畢"，通常要回到開頭嗎？
                // 根據需求："按下播放按鈕即可在該句的任何時刻暫停，再次按...繼續"。
                // 這裡處理的是自然播放結束。既然結束了，我們就讓它停在結尾，或者重置圖標為Play。
                updateIcon(activeIndex, "play");
                // 防止超過一點點
                // audio.currentTime = endTime; 
            }
        }

        function updateIcon(index, state) {
            const icon = document.getElementById(`icon-${index}`);
            const btn = icon.parentElement;
            if (state === "pause") {
                // 顯示暫停圖標
                icon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
                btn.classList.add("playing");
            } else {
                // 顯示播放圖標
                icon.innerHTML = '<path d="M8 5v14l11-7z"/>';
                btn.classList.remove("playing");
            }
        }

        function resetIcons() {
            document.querySelectorAll(".play-btn").forEach(btn => {
                btn.classList.remove("playing");
                btn.querySelector("svg").innerHTML = '<path d="M8 5v14l11-7z"/>';
            });
        }

        // 完成打卡
        function finishPractice() {
            if (!currentUser) return;
            
            const now = new Date();
            const month = now.getMonth() + 1;
            const day = now.getDate();
            const text = `${currentUser}已於是${month}月${day}日完成作品1號跟讀練習！`;
            
            navigator.clipboard.writeText(text).then(() => {
                document.getElementById("modal-bg").style.display = "block";
                document.getElementById("success-modal").style.display = "block";
            }).catch(err => {
                alert("複製失敗，請手動複製：" + text);
            });
        }

        function closeModal() {
            document.getElementById("modal-bg").style.display = "none";
            document.getElementById("success-modal").style.display = "none";
        }

        // --- 開發者模式 ---
        let devMode = false;
        let calibrationIndex = 0;
        let calibrationData = [];

        function toggleDevPanel() {
            devMode = !devMode;
            const panel = document.getElementById("dev-panel");
            if (devMode) {
                panel.classList.add("active");
                // 載入當前數據結構以供校準
                calibrationData = JSON.parse(JSON.stringify(contentData));
            } else {
                panel.classList.remove("active");
            }
        }

        function startCalibration() {
            calibrationIndex = 0;
            audio.currentTime = 0;
            audio.play();
            document.getElementById("dev-status").innerText = "正在錄製第 1 句...";
            highlightDevSentence(0);
            
            // 重置所有開始時間為0，之後動態填入
            calibrationData[0].start = 0;
        }

        function markSplit() {
            if (!devMode || calibrationIndex >= calibrationData.length) return;
            
            const now = audio.currentTime;
            
            // 結束當前句子
            calibrationData[calibrationIndex].end = parseFloat(now.toFixed(2));
            
            // 準備下一句
            calibrationIndex++;
            if (calibrationIndex < calibrationData.length) {
                calibrationData[calibrationIndex].start = parseFloat(now.toFixed(2));
                document.getElementById("dev-status").innerText = `正在錄製第 ${calibrationIndex + 1} 句...`;
                highlightDevSentence(calibrationIndex);
            } else {
                document.getElementById("dev-status").innerText = "錄製完成！點擊生成代碼";
                audio.pause();
            }
        }

        function highlightDevSentence(index) {
            document.querySelectorAll(".sentence-container").forEach(el => el.classList.remove("active-sentence"));
            const el = document.getElementById(`sentence-${index}`);
            if(el) {
                el.classList.add("active-sentence");
                el.scrollIntoView({ behavior: "smooth", block: "center" });
            }
        }

        function exportCode() {
            const textarea = document.getElementById("json-output");
            textarea.style.display = "block";
            textarea.value = JSON.stringify(calibrationData, null, 4);
            textarea.select();
            document.execCommand("copy");
            alert("新的時間戳數據已複製！請替換 HTML 中的 contentData 變量。");
        }

        // 啟動
        init();

    </script>
</body>
</html>
